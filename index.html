<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا talk</title>
    <style>
        :root {
            --dark-bg: #040d06;
            --forest: #0a1f10;
            --gold: #d4af37;
            --white: #f0f4f0;
        }

        body { 
            background: radial-gradient(circle, var(--forest) 0%, var(--dark-bg) 100%);
            color: var(--white); 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card-container { 
            width: 85vw; max-width: 360px; height: 520px; 
            border-radius: 24px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.4s ease;
            position: relative;
            background: #000;
        }

        .with-border { border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        img { width: 100%; height: 100%; object-fit: cover; }

        #start-game-btn {
            display: none; margin-top: 20px; padding: 12px 40px;
            background: var(--gold); color: #000; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .game-footer { margin-top: 20px; text-align: center; }
        .hint { color: var(--gold); font-size: 0.9rem; opacity: 0.8; padding: 0 20px; }
        
        #end-screen { display: none; text-align: center; padding: 20px; }
        #end-screen h2 { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="mainCardContainer" class="card-container" ondblclick="handleLogic()">
        <img id="displayImage" src="https://i.postimg.cc/zB70gvby/1.png" alt="Yalla Talk">
    </div>

    <button id="start-game-btn" onclick="goToQuestions()">إضغط هنا لتبدأ اللعبة</button>

    <div class="game-footer" id="footer-area">
        <p id="hintText" class="hint">اضغط مرتين على الكارت علشان تعرف قوانين اللعبة</p>
    </div>

    <div id="end-screen">
        <h2>خلصنا الأسئلة!</h2>
        <p>يا رب تكون القعدة كانت رايقة في "يلا talk"</p>
        <button onclick="location.reload()" style="background:none; color:var(--gold); border:1px solid var(--gold); padding:10px 20px; border-radius:50px; cursor:pointer; margin-top:20px;">إعادة اللعب</button>
    </div>

    <script>
        let currentStep = "start"; 
        let questionIndex = 0;

        // مصفوفة الـ 40 سؤال (تم وضع أول 3 روابط والباقي أماكن فاضية لك)
        const questions = [
            "https://i.postimg.cc/Ss1c4MYz/2.png", 
            "https://i.postimg.cc/d1NGFyZy/3.png", 
            "https://i.postimg.cc/fbB979KC/4.png",
            "link_4", "link_5", "link_6", "link_7", "link_8", "link_9", "link_10",
            "link_11", "link_12", "link_13", "link_14", "link_15", "link_16", "link_17", "link_18", "link_19", "link_20",
            "link_21", "link_22", "link_23", "link_24", "link_25", "link_26", "link_27", "link_28", "link_29", "link_30",
            "link_31", "link_32", "link_33", "link_34", "link_35", "link_36", "link_37", "link_38", "link_39", "link_40"
        ];

        // حط هنا رابط صورة القوانين
        const rulesImage = "https://i.postimg.cc/zB70gvby/1.png"; // مؤقتاً نفس صورة البداية لحين رفعك للقوانين

        function handleLogic() {
            const imgElement = document.getElementById('displayImage');
            const container = document.getElementById('mainCardContainer');
            const hintText = document.getElementById('hintText');

            if (currentStep === "start") {
                imgElement.src = rulesImage;
                container.classList.add('with-border');
                hintText.style.display = "none";
                document.getElementById('start-game-btn').style.display = "block";
                currentStep = "rules";
            } 
            else if (currentStep === "playing") {
                nextQuestion();
            }
        }

        function goToQuestions() {
            document.getElementById('start-game-btn').style.display = "none";
            document.getElementById('hintText').innerText = "اضغط مرتين لسحب سؤال جديد";
            document.getElementById('hintText').style.display = "block";
            currentStep = "playing";
            nextQuestion();
        }

        function nextQuestion() {
            const imgElement = document.getElementById('displayImage');
            const container = document.getElementById('mainCardContainer');

            // لو اللينك مش "link_X" يعرضه، لو خلصنا الروابط الحقيقية يروح للنهاية
            if (questionIndex < questions.length && !questions[questionIndex].startsWith("link_")) {
                container.style.opacity = '0.5';
                setTimeout(() => {
                    imgElement.src = questions[questionIndex];
                    questionIndex++;
                    container.style.opacity = '1';
                }, 200);
            } else {
                container.style.display = "none";
                document.getElementById('footer-area').style.display = "none";
                document.getElementById('end-screen').style.display = "block";
                currentStep = "end";
            }
        }
    </script>
</body>
</html>
