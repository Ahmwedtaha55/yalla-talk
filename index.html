<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا talk</title>
    <style>
        :root { --dark-bg: #040d06; }
        body { 
            background-color: var(--dark-bg); color: #f0f4f0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; user-select: none; touch-action: none; 
        }
        .card-container { 
            width: 90vw; max-width: 380px; height: 550px; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.3s ease, opacity 0.2s;
            position: relative; background: transparent;
        }
        img { width: 100%; height: 100%; object-fit: contain; }
        #start-game-btn {
            display: none; margin-top: 30px; padding: 15px 45px;
            background: #d4af37; color: #000; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem; z-index: 10;
        }
        .hint { color: #d4af37; font-size: 0.9rem; opacity: 0.7; margin-top: 20px; }
        #end-screen { display: none; text-align: center; }
    </style>
</head>
<body>

    <audio id="clickSound" preload="auto">
        <source src="click.mp3" type="audio/mpeg">
    </audio>
    <audio id="swipeSound" preload="auto">
        <source src="swipe.mp3" type="audio/mpeg">
    </audio>

    <div id="mainCardContainer" class="card-container">
        <img id="displayImage" src="https://i.postimg.cc/zB70gvby/1.png" alt="Yalla Talk">
    </div>

    <button id="start-game-btn" onclick="goToQuestions()">إضغط هنا لتبدأ اللعبة</button>

    <div id="footer-area">
        <p id="hintText" class="hint">اسحب الكارت لليسار لمعرفة القوانين</p>
    </div>

    <div id="end-screen">
        <h2 style="color:#d4af37">خلصنا الأسئلة!</h2>
        <button onclick="location.reload()" style="background:none; color:#d4af37; border:1px solid #d4af37; padding:10px 20px; border-radius:50px; margin-top:20px;">إعادة اللعب</button>
    </div>

    <script>
        let currentStep = "start"; 
        let questionIndex = -1;
        const questions = [
            "https://i.postimg.cc/Ss1c4MYz/2.png", 
            "https://i.postimg.cc/d1NGFyZy/3.png", 
            "https://i.postimg.cc/fbB979KC/4.png"
            // ضيف باقي الروابط هنا
        ];

        const startImage = "https://i.postimg.cc/zB70gvby/1.png";
        const rulesImage = "https://i.postimg.cc/zB70gvby/1.png"; // غيرها لصورة القوانين لما ترفعها

        let touchstartX = 0;
        let touchendX = 0;
        const container = document.getElementById('mainCardContainer');

        // وظيفة تشغيل الصوت مرة واحدة فقط عند الطلب
        function playEffect(audioId) {
            const sound = document.getElementById(audioId);
            sound.pause(); // يوقف أي صوت شغال
            sound.currentTime = 0; // يرجع البداية
            sound.play(); // يشغل مرة واحدة
        }

        container.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        container.addEventListener('touchend', e => { 
            touchendX = e.changedTouches[0].screenX; 
            handleSwipe(); 
        });

        function handleSwipe() {
            const swipeDistance = touchstartX - touchendX;
            if (Math.abs(swipeDistance) > 50) { // عشان ميشتغلش من لمسة خفيفة غلط
                if (swipeDistance > 50) { // سحب يسار (التالي)
                    if (currentStep === "start") {
                        currentStep = "rules";
                        document.getElementById('displayImage').src = rulesImage;
                        document.getElementById('start-game-btn').style.display = "block";
                        document.getElementById('hintText').style.display = "none";
                        playEffect('swipeSound');
                    } else if (currentStep === "playing") {
                        nextQuestion();
                    }
                } else if (swipeDistance < -50 && currentStep === "playing") { // سحب يمين (السابق)
                    prevQuestion();
                }
            }
        }

        function goToQuestions() {
            playEffect('clickSound');
            document.getElementById('start-game-btn').style.display = "none";
            document.getElementById('hintText').innerText = "اسحب يمين ويسار للتنقل";
            document.getElementById('hintText').style.display = "block";
            currentStep = "playing";
            questionIndex = 0;
            updateCard();
        }

        function nextQuestion() {
            if (questionIndex < questions.length - 1) {
                questionIndex++;
                updateCard();
                playEffect('swipeSound');
            } else {
                showEndScreen();
            }
        }

        function prevQuestion() {
            if (questionIndex > 0) {
                questionIndex--;
                updateCard();
                playEffect('swipeSound');
            }
        }

        function updateCard() {
            const img = document.getElementById('displayImage');
            container.style.opacity = '0';
            setTimeout(() => {
                img.src = questions[questionIndex];
                container.style.opacity = '1';
            }, 150);
        }

        function showEndScreen() {
            container.style.display = "none";
            document.getElementById('footer-area').style.display = "none";
            document.getElementById('end-screen').style.display = "block";
        }
    </script>
</body>
</html>
