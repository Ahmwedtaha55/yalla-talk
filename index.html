<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا talk</title>
    <style>
        :root {
            --dark-bg: #040d06; /* اللون الموحد للباك جراوند */
        }

        body { 
            background-color: var(--dark-bg);
            color: #f0f4f0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; user-select: none;
            touch-action: none; /* لمنع اهتزاز الشاشة أثناء السحب */
        }

        /* حاوية الكارت بدون أي حواف أو ألوان محيطة */
        .card-container { 
            width: 90vw; max-width: 380px; height: 550px; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.2s;
            position: relative;
            background: transparent; /* إزالة أي خلفية للكارت نفسه */
        }

        img { width: 100%; height: 100%; object-fit: contain; }

        #start-game-btn {
            display: none; margin-top: 30px; padding: 15px 45px;
            background: #d4af37; color: #000; font-weight: bold;
            border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem;
            z-index: 10;
        }

        .hint { color: #d4af37; font-size: 0.9rem; opacity: 0.7; margin-top: 20px; text-align: center; }
        
        #end-screen { display: none; text-align: center; }
    </style>
</head>
<body>

    <audio id="clickSound" src="رابط_صوت_الضغط"></audio>
    <audio id="swipeSound" src="رابط_صوت_السحب"></audio>

    <div id="mainCardContainer" class="card-container">
        <img id="displayImage" src="https://i.postimg.cc/zB70gvby/1.png" alt="Yalla Talk">
    </div>

    <button id="start-game-btn" onclick="goToQuestions()">إضغط هنا لتبدأ اللعبة</button>

    <div id="footer-area">
        <p id="hintText" class="hint">اسحب الكارت لليسار لمعرفة القوانين</p>
    </div>

    <div id="end-screen">
        <h2 style="color:#d4af37">خلصنا الأسئلة!</h2>
        <button onclick="location.reload()" style="background:none; color:#d4af37; border:1px solid #d4af37; padding:10px 20px; border-radius:50px; margin-top:20px;">إعادة اللعب</button>
    </div>

    <script>
        let currentStep = "start"; 
        let questionIndex = -1; // بدأت من -1 عشان أول سحب يمين يجيب أول سؤال
        
        const questions = [
            "https://i.postimg.cc/Ss1c4MYz/2.png", 
            "https://i.postimg.cc/d1NGFyZy/3.png", 
            "https://i.postimg.cc/fbB979KC/4.png",
            // ضيف باقي الـ 40 رابط هنا...
        ];

        const startImage = "https://i.postimg.cc/zB70gvby/1.png";
        const rulesImage = "رابط_صورة_القوانين"; 

        // منطق السحب (Touch Logic)
        let touchstartX = 0;
        let touchendX = 0;

        const container = document.getElementById('mainCardContainer');

        container.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        container.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function playSound(id) {
            const sound = document.getElementById(id);
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Sound error"));
        }

        function handleSwipe() {
            const swipeDistance = touchstartX - touchendX;
            
            // سحب لليسار (Next)
            if (swipeDistance > 50) {
                if (currentStep === "start") {
                    showRules();
                } else if (currentStep === "playing") {
                    nextQuestion();
                }
            } 
            // سحب لليمين (Previous)
            else if (swipeDistance < -50) {
                if (currentStep === "playing") {
                    prevQuestion();
                }
            }
        }

        function showRules() {
            playSound('swipeSound');
            document.getElementById('displayImage').src = rulesImage;
            document.getElementById('start-game-btn').style.display = "block";
            document.getElementById('hintText').style.display = "none";
            currentStep = "rules";
        }

        function goToQuestions() {
            playSound('clickSound');
            document.getElementById('start-game-btn').style.display = "none";
            document.getElementById('hintText').innerText = "اسحب يمين ويسار للتنقل بين الكروت";
            document.getElementById('hintText').style.display = "block";
            currentStep = "playing";
            questionIndex = 0;
            updateCard();
        }

        function nextQuestion() {
            if (questionIndex < questions.length - 1) {
                questionIndex++;
                updateCard();
                playSound('swipeSound');
            } else {
                showEndScreen();
            }
        }

        function prevQuestion() {
            if (questionIndex > 0) {
                questionIndex--;
                updateCard();
                playSound('swipeSound');
            }
        }

        function updateCard() {
            const img = document.getElementById('displayImage');
            container.style.opacity = '0';
            setTimeout(() => {
                img.src = questions[questionIndex];
                container.style.opacity = '1';
            }, 200);
        }

        function showEndScreen() {
            container.style.display = "none";
            document.getElementById('footer-area').style.display = "none";
            document.getElementById('end-screen').style.display = "block";
        }
    </script>
</body>
</html>
