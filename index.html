<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يلا talk </title>
    <style>
        :root {
            --dark-black-green: #040d06; /* أسود مخضر داكن جداً */
            --deep-forest: #0a1f10; /* أخضر غامق */
            --gold-light: #d4af37; /* ذهبي مطفي */
            --off-white: #f0f4f0;
        }

        body { 
            background: radial-gradient(circle, var(--deep-forest) 0%, var(--dark-black-green) 100%);
            color: var(--off-white); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* الشاشة الافتتاحية */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-black-green);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-area {
            text-align: center;
        }

        .logo-area h1 {
            font-size: 3.5rem;
            margin: 0;
            color: var(--gold-light);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            font-weight: 900;
        }

        .logo-area p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: -10px;
        }

        .start-btn {
            margin-top: 40px;
            padding: 10px 30px;
            border: 1px solid var(--gold-light);
            border-radius: 50px;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* حاوية الكارت */
        .card-container { 
            width: 85vw; 
            max-width: 360px; 
            height: 520px; 
            border: 1px solid rgba(212, 175, 55, 0.4); 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1);
            pointer-events: none;
        }

        .card-container:active { transform: scale(0.96); }

        img { width: 100%; height: 100%; object-fit: cover; }

        .game-footer {
            margin-top: 30px;
            text-align: center;
        }

        .game-title-small {
            font-size: 1.2rem;
            color: var(--gold-light);
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        .hint { 
            color: var(--off-white); 
            font-size: 0.8rem; 
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- يلا Talk -->
    <div id="splash-screen" onclick="startGame()">
        <div class="logo-area">
            <h1>يلا talk</h1>
            <p>Ready to connect?</p>
        </div>
        <div class="start-btn">إبدأ اللعب</div>
    </div>

    <!-- منطقة الكروت -->
    <div class="card-container" ondblclick="nextCard()" onclick="handleSingleClick()">
        <img id="cardImage" src="https://i.postimg.cc/zB70gvby/1.png" alt="Card">
    </div>

    <div class="game-footer">
        <span class="game-title-small">يلا talk</span>
        <p class="hint">انقر مرتين (Double Click) لتغيير الكارت</p>
    </div>

    <script>
        // مصفوفة الصور - ضع روابطك هنا
        const images = [
            "https://i.postimg.cc/Ss1c4MYz/2.png",
            "https://i.postimg.cc/d1NGFyZy/3.png",
            "https://i.postimg.cc/fbB979KC/4.png"
        ];

        function startGame() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => {
                splash.style.display = 'none';
            }, 800);
        }

        function nextCard() {
            const cardImg = document.getElementById('cardImage');
            const container = document.querySelector('.card-container');
            
            container.style.filter = 'blur(10px) brightness(0.5)';
            container.style.transform = 'scale(0.9) rotate(-2deg)';
            
            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * images.length);
                } while (images.length > 1 && images[randomIndex] === cardImg.src);

                cardImg.src = images[randomIndex];
                container.style.filter = 'none';
                container.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
        }

        // إضافة تنبيه بسيط لو ضغط مرة واحدة بدلاً من مرتين
        let clickTimeout;
        function handleSingleClick() {
            if (!clickTimeout) {
                clickTimeout = setTimeout(() => {
                    clickTimeout = null;
                }, 300);
            }
        }
    </script>
</body>
</html>
